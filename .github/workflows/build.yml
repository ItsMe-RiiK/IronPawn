name: Build IronPawn

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            cmake_args: ""
          - os: windows-latest
            arch: x64
            cmake_args: "-A x64"
          - os: windows-latest
            arch: x86
            cmake_args: "-A Win32"

    steps:
    - uses: actions/checkout@v4

    - name: Set up CMake
      uses: lukka/get-cmake@latest

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev

    - name: Configure CMake
      run: cmake -B build -S . ${{ matrix.cmake_args }}

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IronPawn-${{ runner.os }}-${{ matrix.arch }}
        path: |
          build/IronPawn
          build/Release/IronPawn.exe
