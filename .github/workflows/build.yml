name: Build IronPawn

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build_windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            cmake_args: "-A x64"
            vcpkg_triplet: "x64-windows"
          - arch: x86
            cmake_args: "-A Win32"
            vcpkg_triplet: "x86-windows"

    steps:
    - uses: actions/checkout@v4

    - name: Set up CMake
      uses: lukka/get-cmake@latest

    - name: Install dependencies via vcpkg
      run: |
        vcpkg install curl nlohmann-json --triplet ${{ matrix.vcpkg_triplet }}

    - name: Configure CMake
      run: cmake -B build -S . ${{ matrix.cmake_args }} -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release

    - name: Rename executable
      run: Move-Item -Path build\Release\IronPawn.exe -Destination build\Release\IronPawn-Windows-${{ matrix.arch }}.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IronPawn-Windows-${{ matrix.arch }}
        path: build/Release/IronPawn-Windows-${{ matrix.arch }}.exe

  build_linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up CMake
      uses: lukka/get-cmake@latest

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build --config Release

    - name: Archive executable
      run: |
        cd build
        tar -czvf IronPawn-Linux-x64.tar.gz IronPawn

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IronPawn-Linux-x64
        path: build/IronPawn-Linux-x64.tar.gz

  release:
    name: Create Release
    needs: [build_windows, build_linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/IronPawn-Windows-*.exe
            artifacts/IronPawn-Linux-*.tar.gz
