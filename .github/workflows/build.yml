name: Build IronPawn

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_linux:
    name: Build Linux (x64)
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up CMake
      uses: lukka/get-cmake@latest

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build --config Release

    - name: Archive executable
      run: |
        cd build
        find . -name "libdpp.so*" -exec cp {} . \;
        cp -r ../public .
        tar -czvf IronPawn-Linux-x64.tar.gz IronPawn libdpp.so* public

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IronPawn-Linux-x64
        path: build/IronPawn-Linux-x64.tar.gz

  release:
    name: Create Release
    needs: [build_linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/IronPawn-Linux-*.tar.gz
